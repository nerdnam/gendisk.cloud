services:
  gendisk:
    # GitHub Actions가 main 푸시마다 자동 빌드해 올리는 이미지.
    # 로컬에서 직접 빌드하려면 `docker compose build` (build: . 사용)
    image: ghcr.io/nerdnam/gendisk.cloud:latest
    build: .
    container_name: gendisk
    ports:
      - "8000:8000"
    volumes:
      # 계정 DB·업로드 파일·썸네일이 모두 여기 저장됩니다 (컨테이너를 지워도 유지)
      - /mnt/Data0/ncloud/data:/app/data
      # ── 외부 저장소 ──────────────────────────────────────────────
      # /app/mounts/<이름> 으로 마운트한 폴더는 웹 UI 사이드바에
      # "<이름>" 저장소로 나타나 탐색·업로드·미리보기가 가능합니다.
      # 읽기 전용으로 연결하려면 끝에 :ro 를 붙이세요 (UI에 🔒 표시).
      # 예시 (원하는 대로 수정/추가):
      # - /mnt/Data0/Media:/app/mounts/media
      # - /mnt/Data0/Backup:/app/mounts/backup:ro
    # environment:
      # ── Homepage 대시보드 위젯 (Nextcloud 위젯 호환) ──────────────
      # 아래 토큰을 설정하면 Homepage 의 nextcloud 위젯에서 이 서버를 띄울 수 있습니다.
      # Homepage 위젯의 key 에 같은 값을 넣으세요. (미설정 시 관리자 아이디/비번으로도 가능)
      # - GENDISK_SERVERINFO_TOKEN=원하는_랜덤_문자열
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/auth/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
